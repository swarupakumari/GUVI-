<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
        }

        .card {
            border-radius: 15px;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn {
            border-radius: 10px;
        }

        .title {
            font-weight: bold;
            color: #333;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card shadow p-4" style="width: 400px;">
    
    <h3 class="text-center mb-4 title">Welcome Back</h3>

    <form id="loginForm">
        <input class="form-control mb-3" name="email" type="email" placeholder="Email Address" required>

        <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>

        <button class="btn btn-success w-100">Login</button>
    </form>

    <div class="text-center mt-3">
        <small>Dont have an account?</small><br>
        <a href="register.html" class="text-decoration-none">Register here</a>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="assets/js/login.js"></script>

</body>
</html>
