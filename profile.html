<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }

        .card {
            border-radius: 15px;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn {
            border-radius: 10px;
        }

        .title {
            font-weight: bold;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card shadow p-4" style="width: 420px;">
    
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="title">Your Profile</h4>
        <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
    </div>

    <form id="profileForm">
        <input class="form-control mb-3" name="age" placeholder=" Age" required>

        <input class="form-control mb-3" name="dob" type="date" required>

        <input class="form-control mb-3" name="contact" placeholder="Contact Number" required>

        <button class="btn btn-primary w-100">Save Profile</button>
    </form>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="assets/js/profile.js"></script>

<script>
function logout() {
    localStorage.removeItem("session_id");
    window.location = "login.html";
}
</script>

</body>
</html>
